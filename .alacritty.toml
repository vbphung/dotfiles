[general]
import = ["~/.config/alacritty/tokyonight/tokyo-night.toml"]

[env]
TERM = "xterm-256color"

[window]
opacity = 0.92
dimensions = { columns = 160, lines = 40 }

[font]
normal = { family = "Input Mono", style = "Regular" }
size = 10.5
offset = { x = 0, y = 3 }

[cursor]
style = { shape = "Block", blinking = "Never" }
